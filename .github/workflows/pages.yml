name: Build & deploy F-Droid repo to Pages

# Rebuilds the signed F-Droid index from the APKs attached to this repo's
# Releases and deploys it to GitHub Pages as an artifact. Nothing is committed
# to git — the APKs live in Releases, the served index lives in an ephemeral
# Pages artifact. This is the CI half of the pipeline; publish.sh is the local half.
#
# Required repository secrets (set once, see README):
#   FDROID_KEYSTORE_P12_BASE64  base64 of keystore.p12 (the repo INDEX key)
#   FDROID_KEYSTORE_PASS        password for keystore.p12 / the "index" alias

on:
  workflow_dispatch:
  push:
    branches: [main]
    # publish.sh appends to published.log and pushes it after uploading a
    # release's assets; that push is a fresh commit, so the deploy gets a fresh
    # Pages build version and is actually served (a release event reuses main's
    # commit, which GitHub Pages dedupes away). Workflow edits redeploy too.
    paths: ['.github/workflows/**', 'published.log']

# One deploy at a time; let an in-progress run finish (don't cancel mid-deploy).
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read   # download release assets
  pages: write     # deploy to Pages
  id-token: write  # OIDC token for deploy-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fdroidserver
        # Ubuntu's apt fdroidserver (2.2.1) ships an androguard too old to parse
        # modern APKs ("res1 must be zero!"); install the current release instead.
        run: |
          sudo apt-get update
          sudo apt-get install -y pipx
          pipx install fdroidserver
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Restore index signing key + config
        env:
          FDROID_KEYSTORE_P12_BASE64: ${{ secrets.FDROID_KEYSTORE_P12_BASE64 }}
          FDROID_KEYSTORE_PASS: ${{ secrets.FDROID_KEYSTORE_PASS }}
        run: |
          echo "$FDROID_KEYSTORE_P12_BASE64" | base64 -d > keystore.p12
          # fdroidserver refuses group/world-readable secrets
          chmod 600 keystore.p12
          cat > config.yml <<EOF
          repo_url: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/repo"
          repo_name: "Dmitnin F-Droid"
          repo_description: "Personal Android apps by dmitnin."
          archive_older: 0
          keystore: "keystore.p12"
          repo_keyalias: "index"
          keystorepass: "${FDROID_KEYSTORE_PASS}"
          keypass: "${FDROID_KEYSTORE_PASS}"
          keydname: "CN=dmitnin F-Droid"
          sdk_path: "${ANDROID_HOME}"
          EOF
          chmod 600 config.yml

      - name: Download signed APKs + listing icons from Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p repo icon_staging
          # Each app/version is its own release; pull every APK asset, plus any
          # listing icon (publish.sh --icon uploads it as "<package>.png").
          for tag in $(gh release list --limit 1000 --json tagName -q '.[].tagName'); do
            echo "::group::$tag"
            gh release download "$tag" --pattern '*.apk' --dir repo --clobber || true
            # Stage icons tagged with the release's versionCode (the tag's
            # trailing -N) so the newest icon per package wins below.
            vc="${tag##*-}"
            tmpd="$(mktemp -d)"
            if gh release download "$tag" --pattern '*.png' --dir "$tmpd" 2>/dev/null; then
              for f in "$tmpd"/*.png; do
                [ -e "$f" ] || continue
                mv "$f" "icon_staging/$(basename "$f" .png).${vc}.png"
              done
            fi
            rm -rf "$tmpd"
            echo "::endgroup::"
          done
          echo "APKs collected:"
          ls -la repo/*.apk || { echo "No APKs found in any release."; exit 1; }

          # Place the highest-versionCode icon per package into repo metadata;
          # fdroidserver then serves it as the app's listing icon (sidesteps APK
          # icon extraction, which release resource-shrinking can break).
          shopt -s nullglob
          declare -A best_vc best_file
          for f in icon_staging/*.png; do
            base="$(basename "$f" .png)"   # <package>.<vc>
            pkg="${base%.*}"; vc="${base##*.}"
            if [ -z "${best_vc[$pkg]:-}" ] || [ "$vc" -gt "${best_vc[$pkg]}" ]; then
              best_vc[$pkg]="$vc"; best_file[$pkg]="$f"
            fi
          done
          for pkg in "${!best_file[@]}"; do
            mkdir -p "metadata/${pkg}/en-US"
            cp "${best_file[$pkg]}" "metadata/${pkg}/en-US/icon.png"
            echo "icon: $pkg <- ${best_file[$pkg]}"
          done

      - name: Build & sign the index
        run: |
          fdroid update --create-metadata --pretty --use-date-from-apk
          # fdroidserver hardcodes the landing-page QR alt/title as "QR: test"
          # (index.py); rewrite it to the repo name on the generated page.
          sed -i 's/QR: test/QR: Dmitnin F-Droid/g' repo/index.html

      - name: Stage Pages site
        run: |
          mkdir -p _site
          cp -r repo _site/repo
          [ -d archive ] && cp -r archive _site/archive || true

      - name: Print add-repo link
        env:
          FDROID_KEYSTORE_PASS: ${{ secrets.FDROID_KEYSTORE_PASS }}
        run: |
          fp=$(keytool -list -keystore keystore.p12 -storetype PKCS12 \
                 -storepass "$FDROID_KEYSTORE_PASS" -alias index 2>/dev/null \
               | sed -n 's/.*SHA-256): //p' | tr -d ':' | tr 'A-F' 'a-f')
          url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/repo"
          {
            echo "### F-Droid repo deployed"
            echo ""
            echo "Add this in the F-Droid client (Settings → Repositories → +):"
            echo ""
            echo "    ${url}?fingerprint=${fp}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
