name: Build & deploy F-Droid repo to Pages

# Rebuilds the signed F-Droid index from the APKs attached to this repo's
# Releases and deploys it to GitHub Pages as an artifact. Nothing is committed
# to git — the APKs live in Releases, the served index lives in an ephemeral
# Pages artifact. This is the F-Droid-client counterpart to publish.sh/Obtainium.
#
# Required repository secrets (set once, see README):
#   FDROID_KEYSTORE_P12_BASE64  base64 of keystore.p12 (the repo INDEX key)
#   FDROID_KEYSTORE_PASS        password for keystore.p12 / the "index" alias

on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [published, released, edited]

# One deploy at a time; let an in-progress run finish (don't cancel mid-deploy).
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read   # download release assets
  pages: write     # deploy to Pages
  id-token: write  # OIDC token for deploy-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get install -y fdroidserver

      - name: Restore index signing key + config
        env:
          FDROID_KEYSTORE_P12_BASE64: ${{ secrets.FDROID_KEYSTORE_P12_BASE64 }}
          FDROID_KEYSTORE_PASS: ${{ secrets.FDROID_KEYSTORE_PASS }}
        run: |
          echo "$FDROID_KEYSTORE_P12_BASE64" | base64 -d > keystore.p12
          # fdroidserver refuses group/world-readable secrets
          chmod 600 keystore.p12
          cat > config.yml <<EOF
          repo_url: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/repo"
          repo_name: "dmitnin F-Droid"
          repo_description: "Personal Android apps by dmitnin."
          archive_older: 0
          keystore: "keystore.p12"
          repo_keyalias: "index"
          keystorepass: "${FDROID_KEYSTORE_PASS}"
          keypass: "${FDROID_KEYSTORE_PASS}"
          keydname: "CN=dmitnin F-Droid"
          sdk_path: "${ANDROID_HOME}"
          EOF
          chmod 600 config.yml

      - name: Download signed APKs from Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p repo
          # Each app/version is its own release; pull every APK asset.
          for tag in $(gh release list --limit 1000 --json tagName -q '.[].tagName'); do
            echo "::group::$tag"
            gh release download "$tag" --pattern '*.apk' --dir repo --clobber || true
            echo "::endgroup::"
          done
          echo "APKs collected:"
          ls -la repo/*.apk || { echo "No APKs found in any release."; exit 1; }

      - name: Build & sign the index
        run: |
          fdroid update --create-metadata --pretty --use-date-from-apk

      - name: Stage Pages site
        run: |
          mkdir -p _site
          cp -r repo _site/repo
          [ -d archive ] && cp -r archive _site/archive || true

      - name: Print add-repo link
        env:
          FDROID_KEYSTORE_PASS: ${{ secrets.FDROID_KEYSTORE_PASS }}
        run: |
          fp=$(keytool -list -keystore keystore.p12 -storetype PKCS12 \
                 -storepass "$FDROID_KEYSTORE_PASS" -alias index 2>/dev/null \
               | sed -n 's/.*SHA-256): //p' | tr -d ':' | tr 'A-F' 'a-f')
          url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/repo"
          {
            echo "### F-Droid repo deployed"
            echo ""
            echo "Add this in the F-Droid client (Settings → Repositories → +):"
            echo ""
            echo "    ${url}?fingerprint=${fp}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
